{{/* WebSite + Organization 전역 스키마 */}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "WebSite",
      "@id": "{{ .Site.BaseURL }}#website",
      "url": "{{ .Site.BaseURL }}",
      "name": "{{ .Site.Title }}",
      "description": "{{ .Site.Params.description }}",
      "inLanguage": "ko-KR",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "{{ .Site.BaseURL }}search/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    },
    {
      "@type": "Organization",
      "@id": "{{ .Site.BaseURL }}#organization",
      "name": "포커클럽 가이드",
      "url": "{{ .Site.BaseURL }}",
      "logo": {
        "@type": "ImageObject",
        "url": "{{ .Site.BaseURL }}favicon.ico"
      },
      "sameAs": [
        "https://t.me/Texasclub555"
      ]
    }
    {{- if .IsPage }},
    {
      "@type": "BlogPosting",
      "@id": "{{ .Permalink }}#article",
      "headline": "{{ .Title }}",
      "description": "{{ .Description }}",
      "url": "{{ .Permalink }}",
      "datePublished": "{{ .Date.Format "2006-01-02T15:04:05+09:00" }}",
      "dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05+09:00" }}",
      "author": {
        "@type": "Person",
        "name": "포커클럽 가이드",
        "url": "{{ .Site.BaseURL }}about/"
      },
      "publisher": {
        "@id": "{{ .Site.BaseURL }}#organization"
      },
      "inLanguage": "ko-KR",
      "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": "{{ .Permalink }}"
      }
    }
    {{- end }}
  ]
}
</script>

{{/* FAQPage 스키마 — front matter에 faq 배열이 있는 포스트에만 적용 */}}
{{- if .Params.faq }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {{- range $i, $q := .Params.faq }}
    {{- if $i }},{{ end }}
    {
      "@type": "Question",
      "name": {{ $q.question | jsonify }},
      "acceptedAnswer": {
        "@type": "Answer",
        "text": {{ $q.answer | jsonify }}
      }
    }
    {{- end }}
  ]
}
</script>
{{- end }}
