baseURL: "https://club777-claw.github.io/"
languageCode: "ko"
title: "포커클럽 가이드 | 온라인 포커 정보"
theme: "PaperMod"

defaultContentLanguage: ko

params:
  env: production
  title: "포커클럽 가이드"
  description: "온라인 포커 클럽 정보, 게임 가이드, 전략 팁을 제공하는 블로그입니다."
  keywords: [포커, 홀덤, 온라인 포커, 포커 클럽, 포커 전략]
  author: "포커클럽 가이드"
  defaultTheme: dark
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  homeInfoParams:
    Title: "♠️ Premium Poker Club Guide 🎰"
    Content: "텍사스 홀덤의 기초부터 고급 전략까지 — 프로처럼 플레이하세요. ♦️♣️♥️♠️"

  socialIcons:
    - name: telegram
      url: "https://t.me/Texasclub555"

  assets:
    favicon: "/favicon.ico"

  # Google Search Console 인증 (PaperMod 표준 방식)
  analytics:
    google:
      SiteVerificationTag: "3d5f133c826e1f17"

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: blog
      name: 블로그
      url: /posts/
      weight: 10
    - identifier: about
      name: 클럽소개
      url: /about/
      weight: 15
    - identifier: search
      name: 검색
      url: /search/
      weight: 20

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: true
